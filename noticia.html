<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícia — Jornal Percílio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modal de edição */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.visivel { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 36px 40px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-icone { font-size: 40px; margin-bottom: 12px; display: block; text-align: center; }
        .modal h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cor-escura); margin-bottom: 8px; text-align: center; }
        .modal p { font-size: 13px; color: #888; margin-bottom: 20px; text-align: center; }
        .modal input { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; margin-bottom: 10px; }
        .modal input:focus { outline: none; border-color: var(--cor-primaria); }
        .modal-erro { font-size: 12px; color: #e74c3c; margin-bottom: 12px; min-height: 16px; text-align: center; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn-confirmar { padding: 11px 24px; background: var(--cor-primaria); color: white; border: none; border-radius: 25px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.3s; }
        .btn-confirmar:hover { background: #286394; }
        .btn-cancelar { padding: 11px 24px; background: white; color: #aaa; border: 1.5px solid #ddd; border-radius: 25px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-cancelar:hover { border-color: #aaa; color: #666; }

        /* Editor de edição inline */
        .editar-wrapper { display: none; margin-top: 24px; }
        .editar-wrapper.ativo { display: block; }
        .editar-campo { width: 100%; padding: 14px 18px; border: 1.5px solid #e8e8e8; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--cor-texto); background: white; margin-bottom: 14px; transition: border-color 0.3s; resize: vertical; }
        .editar-campo:focus { outline: none; border-color: var(--cor-primaria); box-shadow: 0 0 0 3px rgba(79,163,209,0.1); }
        .editar-titulo-campo { font-family: 'Playfair Display', serif; font-size: 22px; min-height: 60px; }
        .editar-corpo-campo { min-height: 200px; line-height: 1.8; }
        .editar-btns { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
        .btn-salvar-edit { padding: 12px 28px; background: #2ecc71; color: white; border: none; border-radius: 25px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.3s; }
        .btn-salvar-edit:hover { background: #27ae60; }
        .btn-cancelar-edit { padding: 12px 22px; background: white; color: #aaa; border: 1.5px solid #ddd; border-radius: 25px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.3s; }
        .btn-cancelar-edit:hover { border-color: #aaa; color: #666; }

        /* Botão editar flutuante */
        .btn-editar-noticia { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; background: white; border: 1.5px solid #ddd; border-radius: 25px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #666; cursor: pointer; transition: all 0.3s; margin-top: 16px; }
        .btn-editar-noticia:hover { border-color: var(--cor-primaria); color: var(--cor-primaria); }

        /* Galeria de fotos na notícia */
        .noticia-fotos { margin-top: 36px; }
        .noticia-fotos h4 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cor-escura); margin-bottom: 16px; }
        .noticia-fotos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .noticia-fotos-grid img { width: 100%; border-radius: 12px; object-fit: cover; aspect-ratio: 4/3; display: block; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .noticia-fotos-grid img:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }

        /* Lightbox */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .lightbox.visivel { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
        .lightbox-fechar { position: absolute; top: 20px; right: 24px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; line-height: 1; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
        .lightbox-prev { left: 16px; }
        .lightbox-next { right: 16px; }
    </style>
</head>
<body>

<!-- Modal de autenticação para editar -->
<div class="modal-overlay" id="modalAuth">
    <div class="modal">
        <span class="modal-icone">🔐</span>
        <h3>Verificar identidade</h3>
        <p>Digite seu nome completo (igual ao publicado) ou a senha da professora.</p>
        <input type="text" id="inputAuth" placeholder="Nome do autor ou senha da professora" maxlength="80">
        <p class="modal-erro" id="erroAuth"></p>
        <div class="modal-btns">
            <button class="btn-cancelar" id="btnCancelarAuth">Cancelar</button>
            <button class="btn-confirmar" id="btnConfirmarAuth">Confirmar</button>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lightbox-fechar" id="lightboxFechar">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
</div>

<header>
    <div class="topo">
        <div class="topo-texto">
            <h1>Jornal da Escola Percílio</h1>
            <p>Informação, eventos e projetos</p>
        </div>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">← Voltar ao início</a></li>
            <li><a href="noticias-alunos.html">Ver todas as notícias</a></li>
        </ul>
    </nav>
</header>

<main class="noticia-page" id="conteudoNoticia">
    <div style="text-align:center; padding:60px; color:#aaa;">⏳ Carregando notícia...</div>
</main>

<footer>
    <p>© 2026 Jornal Escolar</p>
    <p>Desenvolvido por <a href="https://www.instagram.com/matheus_brands/" target="_blank" rel="noopener noreferrer">Matheus Brands</a></p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4TOGLUFzZ1o5EmvUH63XiWQA1vDxeqps",
        authDomain: "jornal-percilio.firebaseapp.com",
        projectId: "jornal-percilio",
        storageBucket: "jornal-percilio.firebasestorage.app",
        messagingSenderId: "88179619322",
        appId: "1:88179619322:web:fa231bd1eea959fee52043"
    };

    const SENHA_PROFESSORA = "percilio2026";

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const main = document.getElementById("conteudoNoticia");

    const params = new URLSearchParams(window.location.search);
    const id     = params.get("id");

    function escapeHtml(str) {
        return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Lightbox
    let fotosLightbox = [];
    let idxLightbox   = 0;

    function abrirLightbox(fotos, idx) {
        fotosLightbox = fotos;
        idxLightbox   = idx;
        document.getElementById("lightboxImg").src = fotos[idx];
        document.getElementById("lightbox").classList.add("visivel");
        document.getElementById("lightboxPrev").style.display = fotos.length > 1 ? "" : "none";
        document.getElementById("lightboxNext").style.display = fotos.length > 1 ? "" : "none";
    }

    document.getElementById("lightboxFechar").addEventListener("click", () => document.getElementById("lightbox").classList.remove("visivel"));
    document.getElementById("lightbox").addEventListener("click", e => { if (e.target === document.getElementById("lightbox")) document.getElementById("lightbox").classList.remove("visivel"); });
    document.getElementById("lightboxPrev").addEventListener("click", () => { idxLightbox = (idxLightbox - 1 + fotosLightbox.length) % fotosLightbox.length; document.getElementById("lightboxImg").src = fotosLightbox[idxLightbox]; });
    document.getElementById("lightboxNext").addEventListener("click", () => { idxLightbox = (idxLightbox + 1) % fotosLightbox.length; document.getElementById("lightboxImg").src = fotosLightbox[idxLightbox]; });

    if (!id) {
        main.innerHTML = `<div style="text-align:center;padding:80px 20px;">
            <span style="font-size:56px;">📭</span>
            <h2 style="font-family:'Playfair Display',serif;margin:16px 0 10px;color:#0E2A3A;">Notícia não encontrada</h2>
            <a href="index.html" style="background:#4FA3D1;color:white;padding:12px 28px;border-radius:25px;text-decoration:none;font-size:14px;">← Voltar</a>
        </div>`;
    } else {
        try {
            const docRef  = doc(db, "noticias", id);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                main.innerHTML = `<div style="text-align:center;padding:80px 20px;">
                    <span style="font-size:56px;">📭</span>
                    <h2 style="font-family:'Playfair Display',serif;margin:16px 0 10px;color:#0E2A3A;">Notícia não encontrada</h2>
                    <a href="index.html" style="background:#4FA3D1;color:white;padding:12px 28px;border-radius:25px;text-decoration:none;font-size:14px;">← Voltar</a>
                </div>`;
            } else {
                let n = docSnap.data();
                document.title = `${n.titulo} — Jornal Percílio`;

                const metaParts  = [n.data, n.autor ? `Por ${n.autor}` : "", n.turma].filter(Boolean).join(" · ");
                const paragrafos = (n.conteudo || "").split("\n").map(p => p.trim() ? `<p>${escapeHtml(p)}</p>` : "").join("");
                const fotos      = n.fotos || [];

                const fotosHTML = fotos.length > 0 ? `
                    <div class="noticia-fotos">
                        <h4>📷 Fotos</h4>
                        <div class="noticia-fotos-grid" id="fotosGrid">
                            ${fotos.map((url, i) => `<img src="${url}" alt="Foto ${i+1}" data-idx="${i}">`).join("")}
                        </div>
                    </div>` : "";

                main.innerHTML = `
                    <div class="noticia-header">
                        <span class="card-tag" style="position:static;display:inline-block;margin-bottom:16px;">${escapeHtml(n.categoria)}</span>
                        <h2 id="noticiaTitle">${escapeHtml(n.titulo)}</h2>
                        <p class="noticia-meta">${escapeHtml(metaParts)}</p>
                    </div>
                    <hr class="noticia-divider">
                    <div class="noticia-corpo" id="noticiaCorpo">${paragrafos}</div>
                    ${fotosHTML}

                    <!-- Botão editar -->
                    <button class="btn-editar-noticia" id="btnEditarNoticia">✏️ Editar notícia</button>

                    <!-- Editor inline (aparece após autenticação) -->
                    <div class="editar-wrapper" id="editarWrapper">
                        <textarea class="editar-campo editar-titulo-campo" id="editarTitulo">${escapeHtml(n.titulo)}</textarea>
                        <textarea class="editar-campo editar-corpo-campo" id="editarCorpo">${escapeHtml(n.conteudo || "")}</textarea>
                        <div class="editar-btns">
                            <button class="btn-salvar-edit" id="btnSalvarEdit">💾 Salvar alterações</button>
                            <button class="btn-cancelar-edit" id="btnCancelarEdit">Cancelar</button>
                        </div>
                        <p class="status-firebase" id="statusEdit"></p>
                    </div>

                    <div style="margin-top:48px;padding-top:24px;border-top:1px solid #eee;display:flex;gap:12px;flex-wrap:wrap;">
                        <a href="index.html" style="background:#4FA3D1;color:white;padding:11px 24px;border-radius:25px;text-decoration:none;font-size:14px;font-weight:500;">← Voltar ao início</a>
                        <a href="noticias-alunos.html" style="background:white;color:#0E2A3A;border:1.5px solid #ddd;padding:11px 24px;border-radius:25px;text-decoration:none;font-size:14px;font-weight:500;">Ver todas as notícias</a>
                    </div>
                `;

                // Lightbox nas fotos
                if (fotos.length > 0) {
                    document.getElementById("fotosGrid").querySelectorAll("img").forEach(img => {
                        img.addEventListener("click", () => abrirLightbox(fotos, parseInt(img.dataset.idx)));
                    });
                }

                // ── EDIÇÃO ──────────────────────────────────
                const modalAuth    = document.getElementById("modalAuth");
                const inputAuth    = document.getElementById("inputAuth");
                const erroAuth     = document.getElementById("erroAuth");
                const editarWrapper = document.getElementById("editarWrapper");

                document.getElementById("btnEditarNoticia").addEventListener("click", () => {
                    inputAuth.value = "";
                    erroAuth.textContent = "";
                    modalAuth.classList.add("visivel");
                    setTimeout(() => inputAuth.focus(), 100);
                });

                document.getElementById("btnCancelarAuth").addEventListener("click", () => modalAuth.classList.remove("visivel"));
                modalAuth.addEventListener("click", e => { if (e.target === modalAuth) modalAuth.classList.remove("visivel"); });

                document.getElementById("btnConfirmarAuth").addEventListener("click", verificarAuth);
                inputAuth.addEventListener("keydown", e => { if (e.key === "Enter") verificarAuth(); });

                function verificarAuth() {
                    const val = inputAuth.value.trim();
                    if (val === SENHA_PROFESSORA || val.toLowerCase() === (n.autor || "").toLowerCase()) {
                        modalAuth.classList.remove("visivel");
                        editarWrapper.classList.add("ativo");
                        document.getElementById("btnEditarNoticia").style.display = "none";
                        document.getElementById("editarTitulo").focus();
                    } else {
                        erroAuth.textContent = "Nome incorreto. Digite exatamente como está na notícia.";
                        inputAuth.value = "";
                        inputAuth.focus();
                    }
                }

                document.getElementById("btnCancelarEdit").addEventListener("click", () => {
                    editarWrapper.classList.remove("ativo");
                    document.getElementById("btnEditarNoticia").style.display = "";
                });

                document.getElementById("btnSalvarEdit").addEventListener("click", async () => {
                    const btnSalvar = document.getElementById("btnSalvarEdit");
                    const statusEdit = document.getElementById("statusEdit");
                    const novoTitulo  = document.getElementById("editarTitulo").value.trim();
                    const novoCorpo   = document.getElementById("editarCorpo").value.trim();

                    if (!novoTitulo || !novoCorpo) {
                        statusEdit.textContent = "⚠️ Título e texto não podem estar vazios.";
                        return;
                    }

                    btnSalvar.disabled = true;
                    btnSalvar.textContent = "Salvando...";
                    statusEdit.textContent = "";

                    try {
                        await updateDoc(docRef, { titulo: novoTitulo, conteudo: novoCorpo });

                        // Atualiza na tela sem recarregar
                        document.getElementById("noticiaTitle").textContent = novoTitulo;
                        document.getElementById("noticiaCorpo").innerHTML = novoCorpo.split("\n").map(p => p.trim() ? `<p>${escapeHtml(p)}</p>` : "").join("");
                        document.title = `${novoTitulo} — Jornal Percílio`;

                        editarWrapper.classList.remove("ativo");
                        document.getElementById("btnEditarNoticia").style.display = "";
                        statusEdit.textContent = "";

                        // Feedback
                        const ok = document.createElement("p");
                        ok.style.cssText = "color:#2ecc71;font-size:13px;margin-top:8px;";
                        ok.textContent = "✅ Notícia atualizada com sucesso!";
                        document.getElementById("btnEditarNoticia").insertAdjacentElement("afterend", ok);
                        setTimeout(() => ok.remove(), 3000);

                    } catch (e) {
                        statusEdit.textContent = "❌ Erro ao salvar. Tente novamente.";
                        console.error(e);
                    } finally {
                        btnSalvar.disabled = false;
                        btnSalvar.textContent = "💾 Salvar alterações";
                    }
                });
            }
        } catch (e) {
            main.innerHTML = `<div style="text-align:center;padding:80px 20px;">
                <span style="font-size:56px;">⚠️</span>
                <h2 style="font-family:'Playfair Display',serif;margin:16px 0 10px;color:#0E2A3A;">Erro ao carregar</h2>
                <p style="color:#666;margin-bottom:24px;">Verifique sua conexão e tente novamente.</p>
                <a href="index.html" style="background:#4FA3D1;color:white;padding:12px 28px;border-radius:25px;text-decoration:none;font-size:14px;">← Voltar</a>
            </div>`;
            console.error(e);
        }
    }
</script>
</body>
</html>
